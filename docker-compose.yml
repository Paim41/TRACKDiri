services:
  postgres:
    image: postgres:16-alpine
    container_name: trackdiri-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trackdiri
      POSTGRES_PASSWORD: trackdiri
      POSTGRES_DB: trackdiri
    ports:
      - "5432:5432"
    volumes:
      - trackdiri-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackdiri -d trackdiri"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trackdiri-postgres-data:
