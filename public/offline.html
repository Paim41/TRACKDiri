<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline | TRACKDiri</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, sans-serif;
        color: #082844;
        background-image:
          linear-gradient(rgba(244, 251, 255, 0.54), rgba(222, 245, 255, 0.42)),
          url("/assets/trackdiri-background.png");
        background-size: cover;
        background-position: center;
      }
      main {
        width: min(92vw, 440px);
        border: 1px solid rgba(143, 216, 247, 0.58);
        border-radius: 12px;
        background: rgba(247, 252, 255, 0.9);
        padding: 28px;
        box-shadow: 0 18px 48px rgba(6, 58, 120, 0.18);
      }
      img {
        width: 88px;
        height: 88px;
        border-radius: 999px;
        object-fit: contain;
      }
      h1 {
        margin: 18px 0 10px;
        color: #0759A8;
      }
      p {
        line-height: 1.6;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/trackdiri-logo.png" alt="TRACKDiri logo" />
      <h1>TRACKDiri is offline</h1>
      <p>Your app shell is available. New health records will sync after the connection returns when background sync is supported.</p>
    </main>
  </body>
</html>
